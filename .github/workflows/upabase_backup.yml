name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Exportar KB do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          URL = os.environ["SUPABASE_URL"]
          KEY = os.environ["SUPABASE_SERVICE_KEY"]

          def fetch_all(table, order="created_at.asc"):
              rows = []
              offset = 0
              limit = 1000
              while True:
                  req = urllib.request.Request(
                      f"{URL}/rest/v1/{table}?select=*&limit={limit}&offset={offset}&order={order}",
                      headers={"apikey": KEY, "Authorization": f"Bearer {KEY}"}
                  )
                  try:
                      with urllib.request.urlopen(req) as r:
                          batch = json.loads(r.read())
                          rows.extend(batch)
                          if len(batch) < limit:
                              break
                          offset += limit
                  except Exception as e:
                      print(f"  erro offset {offset}: {e}")
                      break
              return rows

          backup = {"exportado_em": datetime.datetime.utcnow().isoformat() + "Z", "tabelas": {}}

          tabelas = [("kb_documents", "chave.asc"), ("validacoes", "created_at.asc"), ("feedbacks", "created_at.asc")]
          for tabela, order in tabelas:
              try:
                  dados = fetch_all(tabela, order)
                  backup["tabelas"][tabela] = dados
                  print(f"✅ {tabela}: {len(dados)} registros")
              except Exception as e:
                  print(f"⚠️ {tabela}: {e}")
                  backup["tabelas"][tabela] = []

          os.makedirs("backups", exist_ok=True)
          data_hoje = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          filename = f"backups/supabase_backup_{data_hoje}.json"

          with open(filename, "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)
          with open("backups/supabase_backup_latest.json", "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)

          total = sum(len(v) for v in backup["tabelas"].values())
          print(f"\n📦 {filename} — {total} registros totais")
          PYEOF

      - name: Commit e push do backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add backups/
          git diff --staged --quiet || git commit -m "backup: Supabase $(date -u '+%Y-%m-%d') [automated]"
          git push
