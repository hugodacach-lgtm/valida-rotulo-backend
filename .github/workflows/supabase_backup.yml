name: Daily Supabase Backup

on:
  schedule:
    # Todo dia às 06:00 UTC = 03:00 BRT
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests==2.32.3

      - name: Debug secret
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          echo "SUPABASE_KEY length: ${#SUPABASE_KEY}"
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "KEY first 4 chars (deve ser eyJh): ${SUPABASE_KEY:0:4}"
          echo "URL first 8 chars (deve ser https://): ${SUPABASE_URL:0:8}"

      - name: Rodar backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/backup_supabase.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sem mudanças no backup — pulando commit."
          else
            git commit -m "chore(backup): supabase $(date -u +%Y-%m-%d)"
            git push
          fi
