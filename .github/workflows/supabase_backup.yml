name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Exportar e salvar backup via API GitHub
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, datetime, base64

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SUPABASE_KEY = os.environ["SUPABASE_SERVICE_KEY"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          REPO        = os.environ["REPO"]

          # ── 1. Busca dados do Supabase ────────────────────────────────────
          def fetch_all(table, order="created_at.asc"):
              rows, offset, limit = [], 0, 1000
              while True:
                  req = urllib.request.Request(
                      f"{SUPABASE_URL}/rest/v1/{table}?select=*&limit={limit}&offset={offset}&order={order}",
                      headers={"apikey": SUPABASE_KEY, "Authorization": f"Bearer {SUPABASE_KEY}"}
                  )
                  try:
                      with urllib.request.urlopen(req) as r:
                          batch = json.loads(r.read())
                          rows.extend(batch)
                          if len(batch) < limit:
                              break
                          offset += limit
                  except Exception as e:
                      print(f"  ⚠️ {table} offset {offset}: {e}")
                      break
              return rows

          backup = {"exportado_em": datetime.datetime.utcnow().isoformat() + "Z", "tabelas": {}}

          for tabela, order in [("kb_documents","chave.asc"), ("validacoes","created_at.asc"), ("feedbacks","created_at.asc")]:
              try:
                  dados = fetch_all(tabela, order)
                  backup["tabelas"][tabela] = dados
                  print(f"✅ {tabela}: {len(dados)} registros")
              except Exception as e:
                  print(f"⚠️ {tabela}: {e}")
                  backup["tabelas"][tabela] = []

          total = sum(len(v) for v in backup["tabelas"].values())
          print(f"📊 Total: {total} registros")

          # ── 2. Salva via API do GitHub (sem git push) ─────────────────────
          def github_upsert(path, content_str, message):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              headers = {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              }
              content_b64 = base64.b64encode(content_str.encode()).decode()

              # Verifica se o arquivo já existe (para pegar o sha)
              sha = None
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as r:
                      sha = json.loads(r.read())["sha"]
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise

              payload = {"message": message, "content": content_b64}
              if sha:
                  payload["sha"] = sha

              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode(),
                  headers=headers,
                  method="PUT"
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          content_str = json.dumps(backup, ensure_ascii=False, indent=2)
          data_hoje = datetime.datetime.utcnow().strftime("%Y-%m-%d")

          # Salva backup do dia
          path_dia = f"backups/supabase_backup_{data_hoje}.json"
          try:
              github_upsert(path_dia, content_str, f"backup: Supabase {data_hoje} [automated]")
              print(f"✅ Salvo: {path_dia}")
          except Exception as e:
              print(f"❌ Erro ao salvar {path_dia}: {e}")

          # Salva latest
          try:
              github_upsert("backups/supabase_backup_latest.json", content_str, f"backup: latest atualizado {data_hoje} [automated]")
              print("✅ Salvo: backups/supabase_backup_latest.json")
          except Exception as e:
              print(f"❌ Erro ao salvar latest: {e}")

          print("\n🎉 Backup concluído!")
          PYEOF
