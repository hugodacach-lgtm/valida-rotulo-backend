name: Cron Jobs Backend

on:
  schedule:
    # Horários UTC (BRT é UTC-3, então adicione 3h)
    - cron: '0 10 * * *'    # 07:00 BRT diário — Warmup
    - cron: '0 12 * * *'    # 09:00 BRT diário — Monitor DOU
    - cron: '2 12 * * *'    # 09:02 BRT diário — Monitor DOU Backup
    - cron: '0 10 * * 0'    # 07:00 BRT domingo — KB POA Refresh
    - cron: '0 9 * * 0'     # 06:00 BRT domingo — KB Vegetal Refresh
    - cron: '30 10 * * 5'   # 07:30 BRT sexta — KB Warmup
  workflow_dispatch:        # Permite trigger manual via UI do GitHub

jobs:
  warmup-diario:
    if: github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Health check (warmup)
        run: |
          curl -fsS --max-time 120 \
            https://valida-rotulo-backend.onrender.com/health/readiness \
            | head -c 500

  monitor-dou:
    if: github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Monitor DOU
        run: |
          curl -fsS --max-time 600 -X POST \
            https://valida-rotulo-backend.onrender.com/monitor/check \
            | head -c 500

  monitor-dou-backup:
    if: github.event.schedule == '2 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Monitor DOU Backup
        run: |
          curl -fsS --max-time 600 -X POST \
            https://valida-rotulo-backend.onrender.com/monitor/check \
            | head -c 500

  kb-poa-refresh:
    if: github.event.schedule == '0 10 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: KB POA Refresh
        run: |
          curl -fsS --max-time 600 \
            https://valida-rotulo-backend.onrender.com/kb/preload?cat=poa \
            | head -c 500

  kb-vegetal-refresh:
    if: github.event.schedule == '0 9 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: KB Vegetal Refresh
        run: |
          curl -fsS --max-time 600 \
            https://valida-rotulo-backend.onrender.com/kb/refresh-vegetal \
            | head -c 500

  kb-warmup:
    if: github.event.schedule == '30 10 * * 5'
    runs-on: ubuntu-latest
    steps:
      - name: KB Warmup
        run: |
          curl -fsS --max-time 600 \
            https://valida-rotulo-backend.onrender.com/kb/refresh \
            | head -c 500

  manual-trigger:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Manual trigger - executa warmup
        run: |
          echo "Manual trigger ativado — rodando warmup como teste"
          curl -fsS --max-time 120 \
            https://valida-rotulo-backend.onrender.com/health/readiness
