name: KB Crawler — MAPA & ANVISA

on:
  schedule:
    - cron: "0 8 * * 0"   # Todo domingo 05h Brasília (08h UTC)
  workflow_dispatch:        # Execução manual pelo GitHub UI

jobs:
  crawl:
    name: Dispara crawl no backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Acionar /kb/crawl-full no Render
        run: |
          echo "Disparando crawl no backend Render..."
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST https://valida-rotulo-backend.onrender.com/kb/crawl-full \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP status: $RESPONSE"
          cat response.json

      - name: Aguardar processamento (4 minutos)
        run: sleep 240

      - name: Verificar resultado em /kb/crawl-status
        run: |
          echo "Verificando resultado..."
          curl -s https://valida-rotulo-backend.onrender.com/kb/crawl-status | python3 -m json.tool
