name: KB Crawler — MAPA & ANVISA

on:
  schedule:
    - cron: "0 8 * * 0"   # Todo domingo 05h Brasília (08h UTC)
  workflow_dispatch:        # Execução manual pelo GitHub UI

jobs:
  crawl:
    name: Crawl MAPA & ANVISA
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Poppler (necessário para pdf2image/OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-por

      - name: Instalar dependências Python
        run: |
          pip install httpx pypdf playwright pytesseract pdf2image Pillow
          playwright install chromium
          playwright install-deps chromium

      - name: Executar KB Crawler v2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scripts/kb_crawler.py

      - name: Resumo
        if: always()
        run: echo "Crawler v2 finalizado em $(date) — verifique Supabase tabela kb_documents"
