
name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 6 * * 1'  # toda segunda-feira às 06h UTC (03h Brasília)
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Exportar KB do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          URL = os.environ["SUPABASE_URL"]
          KEY = os.environ["SUPABASE_SERVICE_KEY"]

          # Exporta kb_documents completo
          def fetch_all(table):
              rows = []
              offset = 0
              limit = 1000
              while True:
                  req = urllib.request.Request(
                      f"{URL}/rest/v1/{table}?select=*&limit={limit}&offset={offset}&order=chave.asc",
                      headers={
                          "apikey": KEY,
                          "Authorization": f"Bearer {KEY}",
                          "Range-Unit": "items",
                      }
                  )
                  with urllib.request.urlopen(req) as r:
                      batch = json.loads(r.read())
                      rows.extend(batch)
                      if len(batch) < limit:
                          break
                      offset += limit
              return rows

          # Exporta as tabelas principais
          backup = {
              "exportado_em": datetime.datetime.utcnow().isoformat() + "Z",
              "tabelas": {}
          }

          tabelas = ["kb_documents", "validacoes", "feedbacks"]
          for tabela in tabelas:
              try:
                  dados = fetch_all(tabela)
                  backup["tabelas"][tabela] = dados
                  print(f"✅ {tabela}: {len(dados)} registros exportados")
              except Exception as e:
                  print(f"⚠️ {tabela}: {e} (tabela pode não existir)")
                  backup["tabelas"][tabela] = []

          # Salva o arquivo de backup
          os.makedirs("backups", exist_ok=True)
          data_hoje = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          filename = f"backups/supabase_backup_{data_hoje}.json"

          with open(filename, "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)

          # Mantém também um arquivo "latest" para fácil acesso
          with open("backups/supabase_backup_latest.json", "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)

          total = sum(len(v) for v in backup["tabelas"].values())
          print(f"\n📦 Backup salvo: {filename}")
          print(f"📊 Total de registros: {total}")
          PYEOF

      - name: Limpar backups antigos (manter últimos 8 semanas)
        run: |
          cd backups 2>/dev/null || exit 0
          # Lista backups datados em ordem, mantém os 8 mais recentes
          ls supabase_backup_2*.json 2>/dev/null | sort | head -n -8 | xargs rm -f 2>/dev/null || true
          echo "✅ Limpeza concluída"

      - name: Commit e push do backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Só commita se houver mudanças
          git diff --staged --quiet || git commit -m "backup: Supabase $(date -u '+%Y-%m-%d') [automated]"
          git push
